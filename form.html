<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMI calculator</title>
</head>

<body>

    <input type="number" id="weight" placeholder="Weight (kg)">
    <div>
        <input type="number" placeholder="Feet" id="feet">
        <input type="number" placeholder="Inches" id="inches">
    </div>
    <button onclick="calculate()">calculator</button>

    <p id="output"></p>
    <script>
        function calculate() {
            const weight = parseFloat(document.getElementById("weight").value);
            const feet = parseFloat(document.getElementById("feet").value);
            const inches = parseFloat(document.getElementById("inches").value);

            if (weight > 0 && (feet > 0 || inces > 0)) {
                const totalInches = (feet * 12) + inches;
                const hightinmeters = totalInches * 0.0254;
                const bmi = (weight / (hightinmeters * hightinmeters).toFixed(1));
                let category = " ";
                if (bmi < 18) category = "underweight";
                else if (bmi < 25) category = "normal weight";
                else if (bmi < 30) category = "overweight";
                else category = "obese";
                document.getElementById('output').innerHTML = `your bmi is <b>${bmi}</b> (${category})`;


            } else {
                document.getElementById('output').innerText = "please enter valid numbers!!!";
            }


        }

    </script>
</body>

</html>
