version: '3.8'

services:
  streamlit:
    build: .
    ports:
      - "8501:8501"
    environment:
      - MODEL_PATH=/app/models/best_model.pkl
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    command: streamlit run deployment/streamlit/app.py --server.port=8501 --server.address=0.0.0.0

  flask-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MODEL_PATH=/app/models/best_model.pkl
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    command: python deployment/flask/app.py

  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./models:/app/models
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser